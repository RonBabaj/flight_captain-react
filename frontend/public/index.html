<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <!-- Favicon (paper plane in dark purple circle) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <!-- SEO (description injected from app.json when set) -->
    <meta name="keywords" content="flights, cheap flights, flight search, compare prices, travel deals, round-trip, one-way" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%WEB_TITLE%" />
    <meta property="og:description" content="Compare flight prices and find cheap deals. Search flights, filter by stops and airlines, and discover cheaper routes from hub cities." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="Flight Captain" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%WEB_TITLE%" />
    <meta name="twitter:description" content="Compare flight prices and find cheap deals. Search flights and discover cheaper routes from hub cities." />
    <!-- The `react-native-web` recommended style reset -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
