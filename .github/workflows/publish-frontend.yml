# On push to main: build frontend and publish build output to branch "frontend-build" (orphan).
# Hostinger can deploy static site from that branch.

name: Publish Frontend

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Determine output directory
        id: out
        run: |
          if [ -d frontend/build ]; then
            echo "dir=frontend/build" >> $GITHUB_OUTPUT
          else
            echo "dir=frontend/dist" >> $GITHUB_OUTPUT
          fi

      - name: Push to frontend-build (orphan)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUT_DIR="${{ steps.out.outputs.dir }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan frontend-build
          git reset --hard
          git rm -rf . 2>/dev/null || true
          cp -r "$OUT_DIR"/* .
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Frontend build from main (${{ github.sha }})"
          git push -f origin frontend-build
